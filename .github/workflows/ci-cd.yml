name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: Testes do Backend ───────────────────────────────────────
  test-backend:
    name: Testes Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Executar testes
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_ci

  # ─── JOB 2: Build do Frontend ───────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build de produção
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload dos artefatos de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─── JOB 3: Build da Imagem Docker ──────────────────────────────────
  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        working-directory: backend
        run: docker build -t catalogo-backend:${{ github.sha }} .

  # ─── JOB 4: Deploy (apenas na branch main) ──────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, build-docker]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Deploy do Backend no Render
      - name: Deploy Backend (Render)
        if: ${{ secrets.RENDER_DEPLOY_HOOK != null }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy do backend disparado no Render"

      # Deploy do Frontend no Vercel
      - name: Deploy Frontend (Vercel)
        if: ${{ secrets.VERCEL_TOKEN != null }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

      - name: Deploy concluído
        run: echo "✅ Deploy realizado com sucesso para produção!"
