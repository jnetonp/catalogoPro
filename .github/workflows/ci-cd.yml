name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Testes Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Executar testes
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_ci

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build de producao
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://catalogopro.onrender.com/api

      - name: Upload dos artefatos de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        working-directory: backend
        run: docker build -t catalogo-backend:${{ github.sha }} .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, build-docker]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Backend (Render)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy do backend disparado no Render"

      - name: Deploy concluido
        run: echo "Deploy realizado com sucesso para producao!"
